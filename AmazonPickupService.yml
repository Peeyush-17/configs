spring:

  application:
    name: AmazonPickupService


  datasource:
    url: jdbc:mysql://localhost:3306/kodewala
    username: root
    password: peeyush@1234


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  kafka:
    bootstrap-servers: localhost:9092

    consumer:

      group-id: pickup-group

      key-deserializer:
        org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer:
        org.springframework.kafka.support.serializer.JsonDeserializer


server:
  port: 8086


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
